name: Lambda Test
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache_key: "mise-v1-{{platform}}-{{install_args_hash}}-{{file_hash}}"
          # 以下のargs指定でhasuraなどのappのtestやlintに不要なツールはインストールされないことを確認済
          install_args: "node npm"
      - run: |
          node -v
          npm -v
          npm ci
          npm run unit
        working-directory: lambda/hello-world
